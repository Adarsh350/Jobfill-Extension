<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>تقديم طلب | Bayt.com</title>
</head>
<body>
  <form id="applyForm" action="https://www.bayt.com/en/apply/">
    <div class="field-row">
      <label for="FirstName">الاسم الأول</label>
      <input id="FirstName" name="FirstName" type="text">
    </div>

    <div class="field-row">
      <label for="LastName">الاسم الأخير</label>
      <input id="LastName" name="LastName" type="text">
    </div>

    <div class="field-row">
      <label for="Email">البريد الإلكتروني</label>
      <input id="Email" name="Email" type="email">
    </div>

    <div class="field-row">
      <label for="Phone">رقم الهاتف</label>
      <input id="Phone" name="Phone" type="tel">
    </div>

    <div class="field-row">
      <label for="CoverLetter">رسالة التقديم</label>
      <textarea id="CoverLetter" name="CoverLetter"></textarea>
    </div>

    <!-- snake_case variants not present in Bayt DOM — PascalCase is authoritative -->
  </form>
</body>
</html>
