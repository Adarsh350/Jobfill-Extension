<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Greenhouse Application Form Fixture</title>
</head>
<body>
  <h1 class="app-title">Senior Product Manager</h1>
  <h1 class="company-name">Acme Corp</h1>

  <form id="application_form">
    <div class="field">
      <label for="first_name">First Name</label>
      <input id="first_name" name="first_name" type="text">
    </div>

    <div class="field">
      <label for="last_name">Last Name</label>
      <input id="last_name" name="last_name" type="text">
    </div>

    <div class="field">
      <label for="email">Email</label>
      <input id="email" name="email" type="email">
    </div>

    <div class="field">
      <label for="phone">Phone</label>
      <input id="phone" name="phone" type="tel">
    </div>

    <div class="field">
      <label for="job_application_linkedin_profile">LinkedIn Profile</label>
      <input id="job_application_linkedin_profile" name="linkedin" type="text">
    </div>

    <div class="field">
      <label for="resume">Resume</label>
      <input id="resume" name="resume" type="file">
    </div>

    <div class="field">
      <label for="cover_letter">Cover Letter</label>
      <textarea id="cover_letter" name="cover_letter"></textarea>
    </div>

    <div class="field">
      <label for="job_application_location">Location</label>
      <select id="job_application_location" name="location">
        <option value="">Select</option>
        <option value="Dubai">Dubai</option>
        <option value="Abu Dhabi">Abu Dhabi</option>
      </select>
    </div>

    <div class="field">
      <label>Work Authorization</label>
      <select name="work_auth_question">
        <option value="">Select</option>
        <option value="Yes">Yes, authorized</option>
        <option value="No">No</option>
      </select>
    </div>

    <div class="field">
      <label for="custom_q1">Why do you want this role?</label>
      <textarea id="custom_q1"></textarea>
    </div>
  </form>
</body>
</html>
