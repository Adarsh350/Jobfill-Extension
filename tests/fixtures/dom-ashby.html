<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Senior Product Marketing Manager at Acme Corp | Ashby</title>
</head>
<body>
  <h1>Senior Product Marketing Manager</h1>

  <form id="ashby-application-form">
    <div class="field">
      <label for="firstName">First Name</label>
      <input id="firstName" name="firstName" type="text">
    </div>

    <div class="field">
      <label for="lastName">Last Name</label>
      <input id="lastName" name="lastName" type="text">
    </div>

    <div class="field">
      <label for="email">Email</label>
      <input id="email" name="email" type="email">
    </div>

    <div class="field">
      <label for="phone">Phone</label>
      <input id="phone" name="phone" type="tel">
    </div>

    <div class="field">
      <label for="linkedin">LinkedIn Profile</label>
      <input id="linkedin" name="linkedin" type="text">
    </div>

    <!-- Custom question fields using [data-field-type] -->
    <div data-field-type="longText">
      <label>Why do you want to work here?</label>
      <textarea></textarea>
    </div>

    <div data-field-type="shortText">
      <label>Work authorization status?</label>
      <input type="text">
    </div>
  </form>
</body>
</html>
