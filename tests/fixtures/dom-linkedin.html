<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>LinkedIn Job Search</title>
</head>
<body>
  <div class="jobs-search-results-container">
    <h1>Software Engineer at Acme Corp</h1>
  </div>

  <div class="jobs-easy-apply-modal">
    <div class="jobs-easy-apply-modal__content">
      <h3>Easy Apply</h3>

      <div class="fb-form-element">
        <label for="firstName">First Name</label>
        <input id="firstName" type="text" autocomplete="given-name">
      </div>

      <div class="fb-form-element">
        <label for="lastName">Last Name</label>
        <input id="lastName" type="text" autocomplete="family-name">
      </div>

      <div class="fb-form-element">
        <label for="email-address">Email Address</label>
        <input id="email-address" type="email">
      </div>

      <div class="fb-form-element">
        <label for="phoneNumber-nationalNumber">Phone Number</label>
        <input id="phoneNumber-nationalNumber" type="tel">
      </div>

      <div class="jobs-easy-apply-modal__footer">
        <button aria-label="Continue to next step">Next</button>
        <button aria-label="Submit application">Submit application</button>
      </div>
    </div>
  </div>
</body>
</html>
